<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رصيدي</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <header>

        <h1>💰 رصيدي</h1>

        <p class="welcome">
            أهلاً أبو عبدالله
        </p>

    </header>

    <section class="balance-card">

        <p class="title">
            الرصيد الحالي
        </p>

        <h2 id="balance">
            0 ريال
        </h2>

    </section>

    <section class="info">

        <div class="box">

            <span>🎯 الهدف</span>

            <strong id="goal">
                800 ريال
            </strong>

        </div>

        <div class="box">

            <span>📅 باقي على الراتب</span>

            <strong id="daysLeft">
                --
            </strong>

        </div>

        <div class="box">

            <span>💵 المسموح اليوم</span>

            <strong id="dailyLimit">
                --
            </strong>

        </div>

    </section>

    <section class="operations">

        <div class="operations-header">

            <h3>آخر العمليات</h3>

            <button id="clearBtn">
                حذف الكل
            </button>

        </div>

        <div id="list">

            <p class="empty">

                لا توجد عمليات

            </p>

        </div>

    </section>

</div>

<button id="addButton">

+

</button>

<div class="modal" id="modal">

<div class="modal-content">

<h2>

إضافة مصروف

</h2>

<input
id="expenseName"
type="text"
placeholder="اسم العملية">

<input
id="expenseAmount"
type="number"
placeholder="المبلغ">

<select id="expenseCategory">

<option>مطعم</option>

<option>بنزين</option>

<option>مترو</option>

<option>بقالة</option>

<option>سيارة</option>

<option>فاتورة</option>

<option>صدقة</option>

<option>أخرى</option>

</select>

<button id="saveExpense">

حفظ

</button>

<button id="closeModal">

إلغاء

</button>

</div>

</div>

<script src="app.js"></script>

</body>

</html>
